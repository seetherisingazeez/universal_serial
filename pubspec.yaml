name: universal_serial
description: "A unified, cross-platform API for USB/UART serial communication across Web, Android, Windows, macOS, and Linux."
version: 0.0.1
homepage: https://github.com/example/universal_serial

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_libserialport: any
  usb_serial: any
  webserial: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
